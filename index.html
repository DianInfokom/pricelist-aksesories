<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pricelist PT Infokom Putra Kencana</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
}

header{
    background:#0d6efd;
    color:#fff;
    text-align:center;
    padding:20px;
}
.marketing{
    margin-top:20px;
    background:white;
    color:#222;
    padding:18px;
    border-radius:15px;
    display:inline-block;
    box-shadow:0 6px 15px rgba(0,0,0,.15);
}

.marketing h2{
    font-size:30px;
    color:#0d6efd;
    margin-bottom:8px;
    letter-spacing:1px;
}

.marketing p{
    font-size:20px;
    font-weight:bold;
    margin:6px 0;
}

.marketing a{
    display:inline-block;
    margin-top:12px;
    padding:12px 25px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.marketing a:hover{
    background:#128C7E;
    transform:scale(1.05);
}
    
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:20px;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

th{
    background:#0d6efd;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f7f7f7;
}

footer{
    margin-top:30px;
    text-align:center;
    padding:20px;
    color:#666;
}
</style>

</head>
<body>

<header>
<h1>PT Infokom Putra Kencana</h1>
<p>Pricelist Accessories</p>

    
<div class="marketing">

<p>👨‍💼 DIAN WICAKSONO</p>
<p>📞 0852-2635-6334</p>

<a href="https://wa.me/6285226356334" target="_blank">
💬 Chat WhatsApp
    </a>
</div>
</header>

<div class="container">

<input
id="search"
type="text"
placeholder="Cari Produk, Merk, atau Seri...">

<table id="pricelist">

<thead></thead>

<tbody></tbody>

</table>

</div>

<footer>
© PT Infokom Putra Kencana
</footer>

<script>

const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vRgXpStc2KxTmNB3HjLE_M-ZNfbv5QqEnflZtG-A5frwwI_-HSnRWTAFeWNg0lZ78hXh0YGHKOXK8it/pub?gid=0&single=true&output=csv";

fetch(csvUrl)
.then(res=>res.text())
.then(csv=>{

const lines=csv.trim().split(/\r?\n/);

const headers=lines[0].split(",");

const thead=document.querySelector("thead");
const tbody=document.querySelector("tbody");

let head="<tr>";

headers.forEach(h=>{
head+=`<th>${h.replace(/"/g,"")}</th>`;
});

head+="</tr>";

thead.innerHTML=head;

for(let i=1;i<lines.length;i++){

const cols=lines[i].split(",");

let row="<tr>";

cols.forEach((col,index)=>{

    col = col.replace(/"/g,"");

    if(headers[index].toUpperCase()=="HARGA"){

        if(col.trim().toUpperCase()=="CALL"){

            col="CALL";

        }else if(col.trim()===""){

            col="";

        }else{

            const angka=Number(col);

            if(!isNaN(angka) && angka>0){
                col="Rp "+angka.toLocaleString("id-ID");
            }else{
                col="";
            }

        }

    }

    row += `<td>${col}</td>`;

});

row+="</tr>";

tbody.innerHTML+=row;

}

});

document.getElementById("search").addEventListener("keyup",function(){

const keyword=this.value.toLowerCase();

document.querySelectorAll("#pricelist tbody tr").forEach(row=>{

const text=row.innerText.toLowerCase();

row.style.display=text.includes(keyword)?"":"none";

});

});

</script>

</body>
</html>
