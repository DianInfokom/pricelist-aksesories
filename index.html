    box-shadow:0 4px 10px rgba(0,0,0,.15);

    border-radius:12px 0 0 12px;
}

    border-radius:0 12px 12px 0;
}
  td{
    padding:15px;
    background:white;

</div>
</header>

<div class="container">

<input
id="search"
type="text"
placeholder="Cari Produk, Merk, atau Seri...">

<table id="pricelist">

<thead></thead>

<tbody></tbody>

</table>

</div>

<footer>
© Infokom 
</footer>

<script>

const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vRgXpStc2KxTmNB3HjLE_M-ZNfbv5QqEnflZtG-A5frwwI_-HSnRWTAFeWNg0lZ78hXh0YGHKOXK8it/pub?gid=0&single=true&output=csv";

fetch(csvUrl)
.then(res=>res.text())
.then(csv=>{

const lines=csv.trim().split(/\r?\n/);

const headers=lines[0].split(",");

const thead=document.querySelector("thead");
const tbody=document.querySelector("tbody");

let head="<tr>";

headers.forEach(h=>{
head+=`<th>${h.replace(/"/g,"")}</th>`;
});

head+="</tr>";

thead.innerHTML=head;

for(let i=1;i<lines.length;i++){

const cols=lines[i].split(",");

let row="<tr>";

cols.forEach((col,index)=>{

    col = col.replace(/"/g,"");

    if(headers[index].toUpperCase()=="HARGA"){

        if(col.trim().toUpperCase()=="CALL"){

            col="CALL";

        }else if(col.trim()===""){

            col="";

        }else{

            const angka=Number(col);

            if(!isNaN(angka) && angka>0){
                col="Rp "+angka.toLocaleString("id-ID");
            }else{
                col="";
            }

        }

    }

    row += `<td>${col}</td>`;

});

row+="</tr>";

tbody.innerHTML+=row;

}

});

document.getElementById("search").addEventListener("keyup",function(){

const keyword=this.value.toLowerCase();

document.querySelectorAll("#pricelist tbody tr").forEach(row=>{

const text=row.innerText.toLowerCase();

row.style.display=text.includes(keyword)?"":"none";

});

});

</script>

</body>
