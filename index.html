<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRgXpStc2KxTmNB3HjLE_M-ZNfbv5QqEnflZtG-A5frwwI_-HSnRWTAFeWNg0lZ78hXh0YGHKOXK8it/pub?gid=0&single=true&output=csv";

fetch(csvUrl)
  .then(response => response.text())
  .then(csv => {
    const rows = csv.trim().split("\n");
    const table = document.querySelector("table");

    table.innerHTML = `
      <tr>
        <th>Produk</th>
        <th>Harga</th>
      </tr>
    `;

    rows.slice(1).forEach(row => {
      const cols = row.split(",");

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${cols[0]}</td>
        <td>${cols[1]}</td>
      `;
      table.appendChild(tr);
    });
  })
  .catch(err => console.error(err));
</script>
